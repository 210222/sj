composer_rules:
  challenge:
  - 挑战
  - 难的
  - 难点
  - 困难
  - 高难度
  - 难题
  defer:
  - 退出
  - 暂停
  - 停止
  - 停一下
  - 等等
  probe:
  - 探
  - 测测
  - 检验
  - 检验一下
  - 测试
  - 测试一下
  - 探查
  - 考考
  reflect:
  - 为什么
  - 反思
  - 复盘
  - 回顾
  - 想想看
  - 你觉得
  scaffold:
  - 帮
  - 帮助
  - 教教
  - 教我
  - 指导
  - 怎么
  - 如何
  - 如何做
counterfactual:
  enabled: false
  simulation:
    deterioration_threshold: 0.3
    max_hypotheses: 3
    stabilization_factor: 0.2
  weights:
    alt_path: 0.3
    best_case: 0.3
    worst_case: 0.4
default_domain_passport: medium
default_intent: general
diagnostic_engine:
  enabled: false
diagnostics:
  balance_check:
    smd_threshold: 0.25
  enabled: false
  negative_control:
    min_control_events: 5
    overlap_threshold: 0.8
  placebo_window:
    p_value_threshold: 0.05
    window_hours_before: 2
excursion:
  command_prefix: /excursion
  duration_turns: 3
  enabled: false
flow:
  adjustment:
    cooldown_turns: 3
    max_step: 0.2
  bkt:
    guess: 0.1
    learn: 0.2
    prior: 0.3
    slip: 0.1
  enabled: false
  flow_zone:
    anxiety_threshold: 0.8
    boredom_threshold: 0.2
    optimal_high: 0.6
    optimal_low: 0.4
llm:
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  enabled: true
  fallback_to_rules: false
  max_retries: 2
  max_tokens: 2000
  model: deepseek-chat
  provider: openai
  temperature: 0.7
  timeout_s: 30
mapek:
  analyze:
    min_confidence: 0.3
  enabled: false
  execute:
    max_retries: 2
  knowledge:
    archival_after_days: 30
    confidence_decay_rate: 0.05
  loop:
    adaptive: true
    backpressure_threshold: 0.8
    max_interval_ms: 5000
    min_interval_ms: 100
  monitor:
    buffer_size: 100
    dedup_window_s: 5
  plan:
    max_horizon_steps: 5
memory_recall_limit: 5
mrt:
  eligible_action_types:
  - challenge
  - probe
  - reflect
  - scaffold
  enabled: false
  estimation:
    confidence_level: 0.95
    min_sample_per_variant: 3          # Phase 43: 单用户场景适配 (原 10)
  outcome_metrics:
  - engagement_score
  - completion_rate
  - satisfaction_rating
  randomization_rate: 0.5             # Phase 43: 单用户无对比感知, 50% 安全 (原 0.2)
  window_hours: 24
precedent_intercept:
  action:
    on_hit: block
  enabled: false
  matching:
    max_results: 5
    min_confidence: 0.3
    text_similarity_threshold: 0.4
relational_safety:
  coach_mode: false
  compliance_thresholds:
    passive_agreement_max: 0.7
    rewrite_decline_rate: 0.5
  enabled: false
  forbidden_phrases:
  - 我比你更了解你
  - 你应该听我的
  - 我知道你在想什么
  sovereignty_interval_turns: 10
  sovereignty_statement: 你可以拒绝、改写或退出当前画像——这是你的认知主权。
sdt:
  enabled: false
  signal_decay: 0.9
  thresholds:
    autonomy_low: 0.3
    competence_low: 0.4
    relatedness_low: 0.3
  weights:
    autonomy: 0.35
    competence: 0.35
    relatedness: 0.3
sovereignty_pulse:
  enabled: false
  high_intensity_threshold: 0.7
  max_pulse_rounds: 3
  pulse_cooldown_turns: 5
ttm:
  detect:
    confidence_threshold: 0.6
    min_interactions: 3
  enabled: false
  transition:
    action_to_maintenance_turns: 10
    allow_forward_jump: false
  weights:
    behavioral: 0.3
    cognitive: 0.3
    emotional: 0.2
    social: 0.2
